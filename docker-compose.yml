services:
  redis:
    image: redis:8.4.0-alpine
    restart: unless-stopped
    ports:
      - 6379:6379

  mariadb:
    image: mariadb:11.8
    restart: unless-stopped
    volumes:
      - mariadb-glpi-volume:/var/lib/mysql:rw
    env_file: ./.env
    ports:
      - 3306:3306

  mariadb-timezone:
    image: mariadb:11.8
    restart: on-failure
    env_file: ./.env
    depends_on:
      - mariadb
    command: mariadb -h $MARIADB_HOST -u root -p$MARIADB_ROOT_PASSWORD -e "GRANT SELECT ON \`mysql\`.\`time_zone_name\` TO 'glpi'@'%'; FLUSH PRIVILEGES;"

  base:
    build:
      context: php/
      dockerfile: Dockerfile.base
    image: eftechcombr/glpi:base
    restart: on-failure

  php:
    build:
      context: php/
      args:
        - VERSION=${VERSION}
    image: glpi-custom:latest
    restart: unless-stopped
    volumes:
      - glpi-marketplace:/var/www/html/marketplace:rw
      - glpi-files:/var/lib/glpi:rw
      - glpi-etc:/etc/glpi:rw
    env_file: ./.env
    depends_on:
      - mariadb
      - glpi-db-install
      - glpi-db-configure
      - glpi-verify-dir
      - base
    ports:
      - "9000:9000"

  glpi-db-install:
    image: glpi-custom:latest
    restart: on-failure
    env_file: ./.env
    volumes:
      - glpi-marketplace:/var/www/html/marketplace:rw
      - glpi-files:/var/lib/glpi:rw
      - glpi-etc:/etc/glpi:rw
    depends_on:
      - mariadb
      - base
    command:
      - /usr/local/bin/glpi-db-install.sh

  glpi-verify-dir:
    image: glpi-custom:latest
    restart: on-failure
    volumes:
      - glpi-marketplace:/var/www/html/marketplace:rw
      - glpi-files:/var/lib/glpi:rw
      - glpi-etc:/etc/glpi:rw
    env_file: ./.env
    depends_on:
      - glpi-db-install
      - base
    command:
      - /usr/local/bin/glpi-verify-dir.sh

  glpi-db-configure:
    image: glpi-custom:latest
    restart: on-failure
    volumes:
      - glpi-marketplace:/var/www/html/marketplace:rw
      - glpi-files:/var/lib/glpi:rw
      - glpi-etc:/etc/glpi:rw
    env_file: ./.env
    depends_on:
      - glpi-verify-dir
      - base
    command:
      - /usr/local/bin/glpi-db-configure.sh

  glpi-cache-configure:
    image: glpi-custom:latest
    restart: on-failure
    volumes:
      - glpi-marketplace:/var/www/html/marketplace:rw
      - glpi-files:/var/lib/glpi:rw
      - glpi-etc:/etc/glpi:rw
    env_file: ./.env
    depends_on:
      - glpi-verify-dir
      - redis
      - base
    command:
      - /usr/local/bin/glpi-cache-configure.sh

  nginx:
    build:
      context: nginx/
      args:
        - VERSION=${VERSION}
    image: glpi-nginx-custom:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/ticket.atlasdefenders.com-001/:/etc/nginx/ssl:ro
    depends_on:
      - php

volumes:
  glpi-marketplace:
  glpi-files:
  glpi-etc:
  glpi-install:
  mariadb-glpi-volume:
